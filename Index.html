let lookLastX=null, lookLastY=null;

function setupInput() {
  document.addEventListener('keydown', e=>{
    if(chatOpen) { if(e.key==='Enter') sendChat(); if(e.key==='Escape') closeChat(); return; }
    G.keys[e.code]=true;
    if(e.code==='Space') e.preventDefault();
    if(e.code==='Escape') { G.paused?resumeGame():pauseGame(); }
    if(e.key>='1'&&e.key<='9'&&!G.invOpen) { G.player.hotbarSel=parseInt(e.key)-1; buildHotbar(); }
    if(e.code==='KeyE') { G.invOpen?closeInventory():openInventory(); }
    if(e.code==='KeyT') { openChat(); }
    if(e.code==='KeyF5') cycleCameraMode();
    if(e.code==='KeyF') placeBlock();
  });
  document.addEventListener('keyup', e=>{ G.keys[e.code]=false; });

  const canvas=document.getElementById('gameCanvas');
  canvas.addEventListener('click',()=>{ if(!G.invOpen&&!G.paused&&!chatOpen) canvas.requestPointerLock(); });
  document.addEventListener('pointerlockchange',()=>{
    G.mouse.locked=!!document.pointerLockElement;
  });
  document.addEventListener('mousemove',e=>{
    const cur=document.getElementById('cursor');
    cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
    if(G.mouse.locked&&!G.invOpen) {
      G.player.yaw-=e.movementX*0.002;
      G.player.pitch=Math.max(-Math.PI/2.05,Math.min(Math.PI/2.05,G.player.pitch-e.movementY*0.002));
    }
    cur.classList.toggle('locked',G.mouse.locked);
  });
  document.addEventListener('mousedown',e=>{
    if(!G.mouse.locked||G.invOpen||G.paused) return;
    if(e.button===0) startBreak();
    if(e.button===2) placeBlock();
  });
  document.addEventListener('mouseup',e=>{ if(e.button===0) stopBreak(); });
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('wheel',e=>{
    if(G.invOpen) return;
    G.player.hotbarSel=(G.player.hotbarSel+(e.deltaY>0?1:-1)+9)%9;
    buildHotbar();
  });

  // Mobile
  if('ontouchstart' in window) setupMobile();
}

function setupMobile() {
  document.getElementById('mobileControls').style.display='block';
  ['joystickZone','lookZone','btnJump','btnAttack','btnPlace','btnInv'].forEach(id=>{
    document.getElementById(id).style.display='';
  });

  const jBase=document.getElementById('joystickBase');
  const jKnob=document.getElementById('joystickKnob');
  const jz={active:false,startX:0,startY:0};

  jBase.addEventListener('touchstart',e=>{ e.preventDefault(); jz.active=true; const t=e.touches[0]; jz.startX=t.clientX; jz.startY=t.clientY; },{passive:false});
  jBase.addEventListener('touchmove',e=>{ e.preventDefault(); if(!jz.active)return; const t=e.touches[0]; const dx=(t.clientX-jz.startX)/60,dy=(t.clientY-jz.startY)/60; const l=Math.sqrt(dx*dx+dy*dy); G.joystick.x=l>1?dx/l:dx; G.joystick.y=l>1?dy/l:dy; jKnob.style.transform=`translate(calc(-50% + ${G.joystick.x*40}px),calc(-50% + ${G.joystick.y*40}px))`; },{passive:false});
  jBase.addEventListener('touchend',()=>{ jz.active=false; G.joystick.x=G.joystick.y=0; jKnob.style.transform='translate(-50%,-50%)'; });

  document.getElementById('btnJump').addEventListener('touchstart',e=>{e.preventDefault();G.mobileJump=true;},{passive:false});
  document.getElementById('btnJump').addEventListener('touchend',()=>G.mobileJump=false);
  document.getElementById('btnAttack').addEventListener('touchstart',e=>{e.preventDefault();startBreak();},{passive:false});
  document.getElementById('btnAttack').addEventListener('touchend',()=>stopBreak());
  document.getElementById('btnPlace').addEventListener('touchstart',e=>{e.preventDefault();placeBlock();},{passive:false});
  document.getElementById('btnInv').addEventListener('touchstart',e=>{e.preventDefault();G.invOpen?closeInventory():openInventory();},{passive:false});

  const lz=document.getElementById('lookZone');
  lz.addEventListener('touchstart',e=>{ const t=e.touches[0]; lookLastX=t.clientX; lookLastY=t.clientY; });
  lz.addEventListener('touchmove',e=>{ e.preventDefault(); const t=e.touches[0]; if(lookLastX!==null){ G.player.yaw-=(t.clientX-lookLastX)*0.005; G.player.pitch=Math.max(-Math.PI/2.05,Math.min(Math.PI/2.05,G.player.pitch-(t.clientY-lookLastY)*0.005)); } lookLastX=t.clientX; lookLastY=t.clientY; },{passive:false});
  lz.addEventListener('touchend',()=>{ lookLastX=lookLastY=null; });
}

function cycleCameraMode() {
  G.player.cameraMode=(G.player.cameraMode+1)%3;
  const modes=['1ª Pessoa','3ª Pessoa (Traseira)','3ª Pessoa (Frontal)'];
  document.getElementById('camMode').textContent=modes[G.player.cameraMode];
  if(G.player.cameraMode===0&&playerNetMesh) playerNetMesh.visible=false;
}

// ════════════════════════════════════════════════════════════════════════════
//  MENU PRINCIPAL
// ════════════════════════════════════════════════════════════════════════════
let menuBgCtx, menuBgCanvas;
function drawMenuBackground() {
  if(!menuBgCtx) return;
  const s=16;
  for(let x=0;x<menuBgCanvas.width/s+1;x++) for(let y=0;y<menuBgCanvas.height/s+1;y++) {
    const shade=30+Math.sin(x*0.5+y*0.7+Date.now()*0.001)*15|0;
    menuBgCtx.fillStyle=`rgb(${shade+50},${shade+30},${shade+10})`;
    menuBgCtx.fillRect(x*s,y*s,s,s);
    menuBgCtx.fillStyle=`rgba(0,0,0,0.3)`;
    menuBgCtx.fillRect(x*s+s-2,y*s,2,s);
    menuBgCtx.fillRect(x*s,y*s+s-2,s,2);
  }
  requestAnimationFrame(drawMenuBackground);
}

function drawSkinPreview() {
  const cv=document.getElementById('skinPreviewCanvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,64,128);
  if(G.skinTex?.image) { ctx.drawImage(G.skinTex.image,0,0,64,128); return; }
  // Default Steve
  ctx.fillStyle='#d4a97a'; ctx.fillRect(16,0,32,32); // head
  ctx.fillStyle='#2244aa'; ctx.fillRect(8,32,48,32); // body
  ctx.fillStyle='#d4a97a'; ctx.fillRect(0,32,8,32); ctx.fillRect(56,32,8,32); // arms
  ctx.fillStyle='#1a2a88'; ctx.fillRect(8,64,24,32); ctx.fillRect(32,64,24,32); // legs
}

document.getElementById('skinFile').addEventListener('change', async e=>{
  const file=e.target.files[0];
  if(!file) return;
  const url=URL.createObjectURL(file);
  const img=new Image(); img.onload=()=>{ G.skinTex={image:img}; drawSkinPreview(); }; img.src=url;
  document.getElementById('skinUploadHint').textContent='Skin carregada! (salvo no servidor após entrar)';
  G._pendingSkinFile=file;
});

async function uploadSkin(playerId) {
  if(!G._pendingSkinFile) return null;
  const fd=new FormData();
  fd.append('file',G._pendingSkinFile);
  fd.append('playerId',playerId);
  const res=await apiUpload('/skin/upload',fd);
  return res?.url||null;
}

function showOptions() { showToast('Opções em breve...'); }

// ════════════════════════════════════════════════════════════════════════════
//  PAUSE
// ════════════════════════════════════════════════════════════════════════════
function pauseGame() {
  G.paused=true;
  document.getElementById('pauseMenu').style.display='flex';
  if(G.mouse.locked) document.exitPointerLock();
}
function resumeGame() {
  G.paused=false;
  document.getElementById('pauseMenu').style.display='none';
  document.getElementById('gameCanvas').requestPointerLock();
}
async function saveWorld() {
  if(!G.player.id) return;
  showToast('Salvando mundo...');
  const modified=G.world.modified;
  await apiPost(`/world/${G.currentDim}/save`,{blocks:modified});
  showToast('Mundo salvo!');
}
function backToMenu() {
  apiPost('/player/leave',{playerId:G.player.id});
  G.running=false;
  document.getElementById('pauseMenu').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('mainMenu').style.display='flex';
  drawSkinPreview();
}

// ════════════════════════════════════════════════════════════════════════════
//  TOAST / MENSAGENS
// ════════════════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(text) {
  addChatLine('',text,true);
}

// ════════════════════════════════════════════════════════════════════════════
//  LOOP PRINCIPAL
// ════════════════════════════════════════════════════════════════════════════
let frameCount=0;
function gameLoop() {
  if(!G.running) return;
  requestAnimationFrame(gameLoop);
  const dt=Math.min(G.clock.getDelta(),0.05);
  frameCount++;

  if(!G.paused&&!G.invOpen) {
    updatePlayer(dt);
    if(frameCount%2===0) raycastWorld();
    updateBreaking(dt);
    for(const mob of G.mobs) mob.update(dt);
    updateProjectiles(dt);
    updateDayNight(dt);
    drawViewmodel();
    if(frameCount%10===0) syncMultiplayer();
  }

  if(G.chunkDirty[G.currentDim]) rebuildMesh(G.currentDim);

  G.frames++;
  if(performance.now()-G.lastFPSTime>1000) {
    G.fps=G.frames;
    G.frames=0;
    G.lastFPSTime=performance.now();
    document.getElementById('fpsText').textContent=`FPS: ${G.fps}`;
  }

  G.renderer.render(G.scene, G.camera);
}

// ════════════════════════════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ════════════════════════════════════════════════════════════════════════════
async function startGame() {
  const username=document.getElementById('usernameInput').value.trim()||'Steve';
  G.player.username=username;
  G.player.id='player_'+(Date.now()%100000);

  document.getElementById('mainMenu').style.display='none';
  document.getElementById('loadScreen').style.display='flex';

  setLoad(5,'Inicializando Three.js...');
  initThree();
  setLoad(15,'Construindo texturas...');
  await new Promise(r=>setTimeout(r,50));
  buildTextures();

  setLoad(30,'Gerando Overworld...');
  await new Promise(r=>setTimeout(r,50));
  G.worlds.overworld=new WorldData(DIM.OVERWORLD);
  generateOverworld(G.worlds.overworld);
  G.chunkDirty.overworld=true;

  setLoad(55,'Compilando meshes...');
  await new Promise(r=>setTimeout(r,50));
  rebuildMesh(DIM.OVERWORLD);

  setLoad(65,'Carregando mundo do servidor...');
  const savedWorld=await apiGet('/world/overworld');
  if(savedWorld?.blocks&&Object.keys(savedWorld.blocks).length>0) {
    for(const [key,val] of Object.entries(savedWorld.blocks)) {
      const [x,y,z]=key.split(',').map(Number);
      G.worlds.overworld.set(x,y,z,val);
    }
    G.chunkDirty.overworld=true;
    rebuildMesh(DIM.OVERWORLD);
    showToast('Mundo carregado do servidor!');
  }

  setLoad(75,'Fazendo upload da skin...');
  const skinUrl=await uploadSkin(G.player.id);
  G.player.skinUrl=skinUrl;

  setLoad(85,'Conectando ao servidor...');
  await apiPost('/player/join',{playerId:G.player.id,username,skinUrl});
  G.chatSince=Date.now()-5000;

  setLoad(92,'Gerando mobs passivos...');
  const ow=G.worlds.overworld;
  for(let i=0;i<6;i++) {
    const x=5+Math.random()*(WORLD_W-10)|0, z=5+Math.random()*(WORLD_D-10)|0;
    const y=ow.topY(x,z)+1;
    const t=['pig','cow','sheep'][i%3];
    G.mobs.push(new Mob(t,new THREE.Vector3(x,y,z),DIM.OVERWORLD));
  }

  setLoad(98,'Preparando inventário...');
  initInventory();
  G.player.pos.set(WORLD_W/2, ow.topY(WORLD_W/2|0,WORLD_D/2|0)+2, WORLD_D/2);

  setLoad(100,'Entrando no mundo!');
  await new Promise(r=>setTimeout(r,400));

  document.getElementById('loadScreen').style.display='none';
  document.getElementById('hud').style.display='block';
  updateHUD();
  setupInput();
  addChatLine('','Bem-vindo ao CraftWorld! Use E=Inventário, T=Chat, F5=Câmera, F=Colocar',true);
  addChatLine('','Atravesse o portal de Obsidian para ir ao Nether!',true);

  G.running=true;
  G.clock.start();
  G.lastFPSTime=performance.now();
  gameLoop();

  // Salvar mundo periodicamente
  setInterval(()=>{ if(G.player.id) saveWorld(); },60000);

  // Limpar player ao sair
  window.addEventListener('beforeunload',()=>apiPost('/player/leave',{playerId:G.player.id}));
}

function setLoad(pct, text) {
  document.getElementById('loadFill').style.width=pct+'%';
  document.getElementById('loadText').textContent=text;
}

// Inicialização da tela de menu
window.addEventListener('load',()=>{
  menuBgCanvas=document.getElementById('menuBg');
  menuBgCanvas.width=innerWidth; menuBgCanvas.height=innerHeight;
  menuBgCtx=menuBgCanvas.getContext('2d');
  drawMenuBackground();
  drawSkinPreview();
  document.getElementById('loadScreen').style.display='none';
  document.getElementById('mainMenu').style.display='flex';
});
</script>
